  <circle cx="258" cy="105" r="1.5" fill="#d4a574" opacity="0.4"/>
  <circle cx="264" cy="112" r="1" fill="#d4a574" opacity="0.4"/>
  <circle cx="238" cy="115" r="1.5" fill="#d4a574" opacity="0.4"/>
  <circle cx="244" cy="122" r="1" fill="#d4a574" opacity="0.4"/>
  <circle cx="273" cy="118" r="1.5" fill="#d4a574" opacity="0.4"/>
  <circle cx="278" cy="126" r="1" fill="#d4a574" opacity="0.4"/>
  <!-- Carrot/veggie sticks -->
  <rect x="118" y="90" width="5" height="40" rx="2" fill="#f97316" opacity="0.5" transform="rotate(-15 120 110)"/>
  <rect x="126" y="88" width="4" height="38" rx="2" fill="#ea580c" opacity="0.45" transform="rotate(-8 128 107)"/>
  <rect x="134" y="86" width="5" height="40" rx="2" fill="#f97316" opacity="0.5" transform="rotate(0 136 106)"/>
