      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fed7aa"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)" rx="0"/>
  <!-- Small bowl for hummus/dip -->
  <ellipse cx="170" cy="125" rx="45" ry="20" fill="#f5f0e1" stroke="#d4a574" stroke-width="1.5"/>
  <ellipse cx="170" cy="120" rx="45" ry="20" fill="#fefce8"/>
  <ellipse cx="170" cy="120" rx="38" ry="15" fill="#fef3c7"/>
