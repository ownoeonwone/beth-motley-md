  <circle cx="170" cy="115" r="3" fill="#f59e0b" opacity="0.5"/>
  <!-- Herb sprinkle -->
  <circle cx="163" cy="113" r="1" fill="#22c55e" opacity="0.6"/>
  <circle cx="175" cy="112" r="1" fill="#22c55e" opacity="0.5"/>
  <circle cx="168" cy="116" r="0.8" fill="#16a34a" opacity="0.5"/>
  <!-- Energy balls cluster -->
  <circle cx="260" cy="108" r="16" fill="#92400e" opacity="0.6"/>
  <circle cx="240" cy="118" r="15" fill="#78350f" opacity="0.5"/>
  <circle cx="275" cy="122" r="14" fill="#92400e" opacity="0.55"/>
  <circle cx="255" cy="130" r="13" fill="#78350f" opacity="0.5"/>
