<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)" rx="0"/>
  <!-- Bowl -->
  <ellipse cx="200" cy="120" rx="70" ry="30" fill="#f5f0e1" stroke="#d4a574" stroke-width="2"/>
  <ellipse cx="200" cy="110" rx="70" ry="30" fill="#fefce8"/>
  <ellipse cx="200" cy="110" rx="60" ry="24" fill="#f5e6d0"/>
  <!-- Oats/grain texture -->
  <circle cx="180" cy="106" r="5" fill="#d4a574" opacity="0.6"/>
  <circle cx="195" cy="102" r="4" fill="#c9956b" opacity="0.5"/>
  <circle cx="210" cy="108" r="5" fill="#d4a574" opacity="0.6"/>
  <circle cx="222" cy="104" r="3" fill="#c9956b" opacity="0.5"/>
  <circle cx="188" cy="114" r="4" fill="#c9956b" opacity="0.5"/>
  <circle cx="205" cy="116" r="3" fill="#d4a574" opacity="0.6"/>
  <!-- Berries -->
  <circle cx="175" cy="100" r="6" fill="#dc2626" opacity="0.8"/>
  <circle cx="220" cy="98" r="5" fill="#7c3aed" opacity="0.7"/>
  <circle cx="198" cy="96" r="5" fill="#dc2626" opacity="0.7"/>
  <!-- Banana slices -->
  <ellipse cx="230" cy="106" rx="7" ry="4" fill="#fbbf24" opacity="0.7" transform="rotate(-15 230 106)"/>
  <ellipse cx="170" cy="108" rx="6" ry="3.5" fill="#fbbf24" opacity="0.7" transform="rotate(10 170 108)"/>
  <!-- Steam lines -->
  <path d="M185 80 Q188 70 185 60" fill="none" stroke="#d4a574" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M200 78 Q203 68 200 58" fill="none" stroke="#d4a574" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M215 80 Q218 70 215 60" fill="none" stroke="#d4a574" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Spoon -->
  <line x1="250" y1="130" x2="290" y2="90" stroke="#b8860b" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <ellipse cx="295" cy="86" rx="8" ry="5" fill="#b8860b" opacity="0.5" transform="rotate(-40 295 86)"/>
