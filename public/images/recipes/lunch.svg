<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfccb"/>
      <stop offset="100%" style="stop-color:#d9f99d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)" rx="0"/>
  <!-- Bowl base -->
  <ellipse cx="200" cy="130" rx="80" ry="32" fill="#f5f0e1" stroke="#a3a38a" stroke-width="1.5"/>
  <ellipse cx="200" cy="118" rx="80" ry="32" fill="#fefce8"/>
  <ellipse cx="200" cy="118" rx="72" ry="26" fill="#f0fdf4"/>
  <!-- Greens/salad leaves -->
  <ellipse cx="180" cy="112" rx="18" ry="8" fill="#4ade80" opacity="0.7" transform="rotate(-20 180 112)"/>
  <ellipse cx="210" cy="108" rx="16" ry="7" fill="#22c55e" opacity="0.6" transform="rotate(15 210 108)"/>
  <ellipse cx="195" cy="106" rx="14" ry="6" fill="#86efac" opacity="0.7" transform="rotate(-5 195 106)"/>
  <!-- Grain/quinoa dots -->
  <circle cx="165" cy="118" r="2.5" fill="#d4a574" opacity="0.6"/>
  <circle cx="172" cy="122" r="2" fill="#d4a574" opacity="0.5"/>
  <circle cx="178" cy="120" r="2.5" fill="#c9956b" opacity="0.5"/>
  <circle cx="230" cy="116" r="2" fill="#d4a574" opacity="0.6"/>
  <circle cx="225" cy="122" r="2.5" fill="#c9956b" opacity="0.5"/>
  <!-- Chickpeas -->
  <circle cx="220" cy="114" r="5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="232" cy="110" r="4" fill="#fbbf24" opacity="0.5"/>
  <circle cx="168" cy="114" r="4.5" fill="#f59e0b" opacity="0.6"/>
  <!-- Tomato slices -->
  <circle cx="200" cy="100" r="7" fill="#ef4444" opacity="0.5"/>
  <circle cx="188" cy="98" r="5" fill="#dc2626" opacity="0.4"/>
  <!-- Avocado half -->
  <ellipse cx="240" cy="108" rx="10" ry="7" fill="#65a30d" opacity="0.5" transform="rotate(25 240 108)"/>
  <ellipse cx="240" cy="108" rx="5" ry="3.5" fill="#84cc16" opacity="0.4" transform="rotate(25 240 108)"/>
  <!-- Dressing drizzle -->
  <path d="M175 100 Q195 94 215 100 Q230 104 245 100" fill="none" stroke="#ca8a04" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
