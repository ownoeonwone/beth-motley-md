backend:
  name: github
  repo: ownoeonwone/beth-motley-md
  branch: main
  # For Cloudflare Pages OAuth, see setup instructions below.
  # Option A: Use Decap's free OAuth proxy (easiest to start):
  base_url: https://decap-oauth.netlify.app
  # Option B: Self-host an OAuth app on Cloudflare Workers (see MAINTENANCE.md)

# Store uploaded images in public/images/uploads
media_folder: public/images/uploads
public_folder: /images/uploads

# Editorial workflow adds draft/review/publish states (optional but recommended)
publish_mode: editorial_workflow

# Site URL for preview links
site_url: https://beth-motley-md.pages.dev
display_url: https://beth-motley-md.pages.dev

collections:
  - name: articles
    label: Articles
    label_singular: Article
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} — {{date}}"
    sortable_fields: [title, date]
    fields:
      - label: Title
        name: title
        widget: string
        required: true

      - label: Description
        name: description
        widget: text
        required: true
        hint: Short summary shown in article listings and SEO meta tags.

      - label: Publish Date
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: true

      - label: Featured Image
        name: image
        widget: image
        required: false
        hint: Optional hero image for the article.

      - label: Tags
        name: tags
        widget: list
        default: []
        hint: Comma-separated tags (e.g. lifestyle medicine, prevention).

      - label: Draft
        name: draft
        widget: boolean
        default: false
        hint: Draft articles are not published to the live site.

      - label: Body
        name: body
        widget: markdown

  - name: media
    label: Media Appearances
    label_singular: Media Appearance
    folder: src/content/media
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} ({{type}}) — {{date}}"
    sortable_fields: [title, date, type]
    fields:
      - label: Title
        name: title
        widget: string
        required: true

      - label: Type
        name: type
        widget: select
        options:
          - { label: Podcast, value: podcast }
          - { label: Video, value: video }
          - { label: Article, value: article }
          - { label: Press, value: press }
        required: true

      - label: Source
        name: source
        widget: string
        required: true
        hint: Name of the publication, podcast, or outlet.

      - label: Date
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: true

      - label: Link
        name: href
        widget: string
        required: true
        hint: Full URL to the media appearance.

      - label: YouTube Embed ID
        name: embedId
        widget: string
        required: false
        hint: YouTube video ID for embedding (e.g. dQw4w9WgXcQ).

      - label: Thumbnail Image
        name: image
        widget: image
        required: false

      - label: Featured
        name: featured
        widget: boolean
        default: false
        hint: Featured items are highlighted on the media page.

      - label: Body
        name: body
        widget: markdown
        required: false
        hint: Optional description or notes about this appearance.
